<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライド生成ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px;
      width: 100%;
      max-width: 680px;
      height: fit-content;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: #1a237e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    h1 { font-size: 20px; font-weight: 700; color: #1a237e; }
    .subtitle { font-size: 13px; color: #757575; margin-top: 2px; }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      margin-top: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #424242;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #212121;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
      background: #fff;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #1a237e;
      box-shadow: 0 0 0 3px rgba(26,35,126,0.08);
    }

    textarea { resize: vertical; min-height: 70px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint { font-size: 11px; color: #9e9e9e; margin-top: 4px; }

    .divider {
      border: none;
      border-top: 1.5px solid #f0f0f0;
      margin: 24px 0;
    }

    .count-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .count-input { width: 80px; }

    .count-btn {
      padding: 10px 20px;
      background: #e8eaf6;
      color: #1a237e;
      border: 1.5px solid #c5cae9;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .count-btn:hover { background: #c5cae9; }

    #slideList {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }

    .slide-card {
      border: 1.5px solid #e8eaf6;
      border-radius: 12px;
      overflow: hidden;
    }

    .slide-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f5f6ff;
      cursor: pointer;
      user-select: none;
    }

    .slide-card-header:hover { background: #ebebff; }

    .slide-badge { display: flex; align-items: center; gap: 8px; }

    .badge-num {
      width: 26px;
      height: 26px;
      background: #1a237e;
      color: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .badge-title { font-size: 14px; font-weight: 600; color: #1a237e; }
    .badge-role { font-size: 12px; color: #7986cb; margin-left: 4px; }

    .toggle-icon {
      font-size: 12px;
      color: #9e9e9e;
      transition: transform 0.2s;
    }

    .slide-card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1.5px solid #e8eaf6;
    }

    .slide-card-body.collapsed { display: none; }

    .slide-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #616161;
      margin-bottom: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 28px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { background: #283593; }
    .btn:disabled { background: #9e9e9e; cursor: not-allowed; }

    .status {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #e8eaf6;
      color: #1a237e;
    }

    .status.success {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.error {
      display: block;
      background: #fce4ec;
      color: #c62828;
    }

    .open-btn {
      padding: 6px 14px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #c5cae9;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="header-icon">🎨</div>
    <div>
      <h1>スライド生成ツール</h1>
      <div class="subtitle">GoogleドキュメントからAIがスライドを自動作成</div>
    </div>
  </div>

  <div class="section-label">📄 入力資料</div>

  <label>GoogleドキュメントのURL または ID <span style="color:#c62828">*</span></label>
  <input type="text" id="docId" placeholder="https://docs.google.com/document/d/xxxxx/edit">
  <div class="hint">スライドの元になるGoogleドキュメントを指定してください</div>

  <hr class="divider">

  <div class="section-label">⚙️ 基本設定</div>

  <div class="row">
    <div>
      <label>プレゼンタイトル</label>
      <input type="text" id="title" placeholder="例：2024年度 事業計画">
    </div>
    <div>
      <label>全体のストーリーライン</label>
      <input type="text" id="storySummary" placeholder="例：課題→解決策→効果の流れで">
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">🗂️ スライド構成</div>

  <label>スライド枚数</label>
  <div class="count-row">
    <input type="number" id="slideCount" class="count-input" value="5" min="1" max="20">
    <button class="count-btn" onclick="buildSlideList()">▼ 入力欄を展開</button>
  </div>
  <div class="hint">枚数を入力して「展開」を押すと、スライドごとの設定欄が表示されます</div>

  <div id="slideList"></div>

  <button class="btn" id="generateBtn" onclick="generateSlides()">
    ✨ スライドを生成する
  </button>

  <div class="status loading" id="statusLoading">
    <div class="spinner"></div>
    <span>AIがスライドを生成中です... 少々お待ちください（30〜60秒）</span>
  </div>

  <div class="status success" id="statusSuccess">
    <span>✅ スライドの生成が完了しました！</span>
    <a id="slideLink" href="#" target="_blank" class="open-btn">開く →</a>
  </div>

  <div class="status error" id="statusError">
    <span id="errorMessage"></span>
  </div>

</div>

<script>
  const LAYOUTS = [
    { value: 'title',   label: '表紙' },
    { value: 'section', label: 'セクション区切り' },
    { value: 'content', label: 'コンテンツ' },
    { value: 'closing', label: 'まとめ' },
  ];

  function guessLayout(index, total) {
    if (index === 0) return 'title';
    if (index === total - 1) return 'closing';
    return 'content';
  }

  function buildSlideList() {
    const count = parseInt(document.getElementById('slideCount').value) || 5;
    const list = document.getElementById('slideList');
    list.innerHTML = '';

    for (let i = 0; i < count; i++) {
      const defaultLayout = guessLayout(i, count);
      const roleLabel = LAYOUTS.find(l => l.value === defaultLayout).label;
      const card = document.createElement('div');
      card.className = 'slide-card';

      card.innerHTML = `
        <div class="slide-card-header" onclick="toggleCard(${i})">
          <div class="slide-badge">
            <div class="badge-num">${i + 1}</div>
            <div class="badge-title" id="badge-title-${i}">スライド ${i + 1}</div>
            <div class="badge-role" id="badge-role-${i}">${roleLabel}</div>
          </div>
          <span class="toggle-icon open" id="toggle-icon-${i}">▲</span>
        </div>
        <div class="slide-card-body" id="slide-body-${i}">
          <div class="slide-row">
            <div>
              <div class="field-label">役割</div>
              <select id="layout-${i}" onchange="updateBadge(${i})">
                ${LAYOUTS.map(l => `<option value="${l.value}" ${l.value === defaultLayout ? 'selected' : ''}>${l.label}</option>`).join('')}
              </select>
            </div>
            <div>
              <div class="field-label">タイトル（任意）</div>
              <input type="text" id="slide-title-${i}" placeholder="省略可・AIが自動生成" oninput="updateBadge(${i})">
            </div>
          </div>
          <div>
            <div class="field-label">このスライドへの個別指示（任意）</div>
            <textarea id="slide-prompt-${i}" placeholder="例：競合比較を入れる・数値を具体的に・図解で説明"></textarea>
          </div>
        </div>
      `;

      list.appendChild(card);
    }
  }

  function toggleCard(index) {
    const body = document.getElementById(`slide-body-${index}`);
    const icon = document.getElementById(`toggle-icon-${index}`);
    const isOpen = !body.classList.contains('collapsed');
    body.classList.toggle('collapsed', isOpen);
    icon.textContent = isOpen ? '▼' : '▲';
  }

  function updateBadge(index) {
    const titleVal = document.getElementById(`slide-title-${index}`).value.trim();
    const layoutVal = document.getElementById(`layout-${index}`).value;
    const roleLabel = LAYOUTS.find(l => l.value === layoutVal).label;
    document.getElementById(`badge-title-${index}`).textContent = titleVal || `スライド ${index + 1}`;
    document.getElementById(`badge-role-${index}`).textContent = roleLabel;
  }

  function collectSlides() {
    const count = parseInt(document.getElementById('slideCount').value) || 5;
    const slides = [];
    for (let i = 0; i < count; i++) {
      slides.push({
        slideNumber: i + 1,
        layout: document.getElementById(`layout-${i}`)?.value || 'content',
        title:  document.getElementById(`slide-title-${i}`)?.value.trim() || '',
        prompt: document.getElementById(`slide-prompt-${i}`)?.value.trim() || '',
      });
    }
    return slides;
  }

  function setStatus(type, message, url) {
    ['statusLoading','statusSuccess','statusError'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    if (type === 'loading') {
      document.getElementById('statusLoading').style.display = 'flex';
    } else if (type === 'success') {
      document.getElementById('statusSuccess').style.display = 'flex';
      document.getElementById('slideLink').href = url;
    } else if (type === 'error') {
      document.getElementById('statusError').style.display = 'block';
      document.getElementById('errorMessage').textContent = '❌ ' + message;
    }
  }

  function generateSlides() {
    const docId = document.getElementById('docId').value.trim();
    if (!docId) { alert('GoogleドキュメントのURLまたはIDを入力してください'); return; }

    const slideCards = document.querySelectorAll('.slide-card');
    if (slideCards.length === 0) { alert('「入力欄を展開」を押してスライド構成を設定してください'); return; }

    const params = {
      docId:        docId,
      title:        document.getElementById('title').value.trim(),
      storySummary: document.getElementById('storySummary').value.trim(),
      slides:       collectSlides(),
    };

    document.getElementById('generateBtn').disabled = true;
    setStatus('loading');

    google.script.run
      .withSuccessHandler(function(result) {
        document.getElementById('generateBtn').disabled = false;
        if (result.success) {
          setStatus('success', null, result.url);
        } else {
          setStatus('error', result.error);
        }
      })
      .withFailureHandler(function(err) {
        document.getElementById('generateBtn').disabled = false;
        setStatus('error', err.message);
      })
      .generateSlides(params);
  }

  // 初期展開
  buildSlideList();
</script>
</body>
</html>
